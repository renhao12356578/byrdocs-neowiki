<svg xmlns="http://www.w3.org/2000/svg" width="580" height="540" viewBox="0 0 580 540">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3.5 L0,7 L1.8,3.5 Z" fill="#111"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <!-- 圆形电流回路 -->
  <circle cx="250" cy="275" r="125" fill="none" stroke="#111" stroke-width="5"/>
  <!-- 坐标轴 -->
  <line x1="250" y1="445" x2="250" y2="65" stroke="#111" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="250" y1="275" x2="500" y2="275" stroke="#111" stroke-width="6" marker-end="url(#arrow)"/>
  <!-- 电流 I1：圆周左侧向上 -->
  <path d="M145 343 A125 125 0 0 1 126 286" fill="none" stroke="#111" stroke-width="5" marker-end="url(#arrow)"/>
  <!-- 电流 I2：沿 y 轴向上 -->
  <line x1="250" y1="275" x2="250" y2="218" stroke="#111" stroke-width="5" marker-end="url(#arrow)"/>
  <!-- 标注 -->
  <text x="520" y="264" font-family="Times New Roman, STIX Two Math, serif" font-size="48" font-style="italic">x</text>
  <text x="275" y="78" font-family="Times New Roman, STIX Two Math, serif" font-size="48" font-style="italic">y</text>
  <text x="200" y="325" font-family="Times New Roman, STIX Two Math, serif" font-size="48" font-style="italic">O</text>
  <text x="28" y="278" font-family="Times New Roman, STIX Two Math, serif" font-size="46" font-style="italic">I<tspan font-size="29" baseline-shift="sub">1</tspan></text>
  <text x="178" y="225" font-family="Times New Roman, STIX Two Math, serif" font-size="46" font-style="italic">I<tspan font-size="29" baseline-shift="sub">2</tspan></text>
</svg>
