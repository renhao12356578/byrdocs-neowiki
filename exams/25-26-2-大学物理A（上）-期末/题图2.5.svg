<svg xmlns="http://www.w3.org/2000/svg" width="560" height="500" viewBox="0 0 560 500">
  <rect width="100%" height="100%" fill="white"/>
  <!-- 圆周 Q -->
  <circle cx="280" cy="255" r="165" fill="none" stroke="#111" stroke-width="5"/>
  <!-- 圆心 O -->
  <circle cx="280" cy="255" r="5" fill="#111"/>
  <!-- 半径 R，指向圆周微元 -->
  <line x1="280" y1="255" x2="397" y2="138" stroke="#111" stroke-width="4" stroke-linecap="round"/>
  <!-- 圆周微元 ΔS：内侧短弧与原圆周围成小椭圆形 -->
  <path d="M397 138 C398 158 410 181 430 187"
        fill="none" stroke="#111" stroke-width="4" stroke-linecap="round"/>
  <!-- 标注 -->
  <text x="70" y="100" font-family="Times New Roman, STIX Two Math, serif" font-size="48" font-style="italic">Q</text>
  <text x="242" y="291" font-family="Times New Roman, STIX Two Math, serif" font-size="47" font-style="italic">O</text>
  <text x="345" y="218" font-family="Times New Roman, STIX Two Math, serif" font-size="46" font-style="italic">R</text>
  <text x="435" y="145" font-family="Times New Roman, STIX Two Math, serif" font-size="46" font-style="italic">ΔS</text>
</svg>
