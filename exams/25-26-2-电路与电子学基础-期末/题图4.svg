<svg xmlns="http://www.w3.org/2000/svg" width="500" height="270" viewBox="0 0 500 270" role="img" aria-labelledby="title desc">
  <title id="title">含开关的动态电路</title>
  <desc id="desc">左右两部分电路共用下方参考节点，并由上方开关 S 连接。开关当前断开，刀片从左触点向右上方抬起，并标出顺时针闭合方向。左侧有 4 欧姆电阻与 10 伏电压源串联支路，以及 1 欧姆电阻与 2 亨利电感串联支路，电感电流 i 下标 L 向下。右侧有 4 欧姆电阻支路和向上的 2 安培电流源，端电压 u 上正下负。</desc>
  <defs>
    <style>
      .wire { fill: none; stroke: #111; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .component { fill: #fff; stroke: #111; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .node { fill: #111; }
      .contact { fill: #fff; stroke: #111; stroke-width: 2.2; }
      .label { fill: #111; font-family: "Times New Roman", "Noto Serif CJK SC", serif; font-size: 22px; }
      .small { font-size: 19px; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
  </defs>

  <g id="common-rails">
    <path class="wire" d="M 60 230 H 405"/>
    <path class="wire" d="M 60 55 H 220"/>
    <path class="wire" d="M 295 55 H 405"/>
  </g>

  <g id="switch-S">
    <circle class="contact" cx="225" cy="55" r="4.5"/>
    <circle class="contact" cx="290" cy="55" r="4.5"/>
    <path class="wire" d="M 225 51 L 258 20"/>
    <path class="wire" d="M 253 17 C 276 26, 280 43, 269 58" marker-end="url(#arrow)"/>
    <text class="label" x="199" y="29" font-style="italic">S</text>
  </g>

  <g id="left-source-branch">
    <path class="wire" d="M 60 55 V 100 M 60 145 V 167 M 60 203 V 230"/>
    <rect class="component" x="50" y="100" width="20" height="45"/>
    <circle class="component" cx="60" cy="185" r="18"/>
    <text class="label" x="82" y="130">4 Ω</text>
    <text class="label small" x="91" y="174">+</text>
    <text class="label small" x="104" y="193">10 V</text>
    <text class="label small" x="94" y="218">−</text>
  </g>

  <g id="inductor-branch">
    <path class="wire" d="M 185 55 V 100 M 185 145 V 160"/>
    <rect class="component" x="175" y="100" width="20" height="45"/>
    <path class="wire" d="M 185 160 C 198 160, 198 176, 185 176 C 198 176, 198 192, 185 192 C 198 192, 198 208, 185 208 V 230"/>
    <path class="wire" d="M 185 204 V 226" marker-end="url(#arrow)"/>
    <text class="label" x="207" y="130">1 Ω</text>
    <text class="label" x="218" y="188">2 H</text>
    <text class="label small" x="207" y="215" font-style="italic">i<tspan baseline-shift="sub" font-size="14">L</tspan></text>
    <circle class="node" cx="185" cy="55" r="3.7"/>
    <circle class="node" cx="185" cy="230" r="3.7"/>
  </g>

  <g id="right-resistor-branch">
    <path class="wire" d="M 335 55 V 102 M 335 152 V 230"/>
    <rect class="component" x="325" y="102" width="20" height="50"/>
    <text class="label" x="282" y="134">4 Ω</text>
    <circle class="node" cx="335" cy="55" r="3.7"/>
    <circle class="node" cx="335" cy="230" r="3.7"/>
  </g>

  <g id="current-source-branch">
    <path class="wire" d="M 405 55 V 115 M 405 155 V 230"/>
    <circle class="component" cx="405" cy="135" r="20"/>
    <path class="wire" d="M 405 149 V 121" marker-end="url(#arrow)"/>
    <text class="label small" x="376" y="142" text-anchor="end">2 A</text>
  </g>

  <g id="voltage-label" class="label">
    <text class="small" x="446" y="111">+</text>
    <text x="445" y="151" font-style="italic">u</text>
    <text class="small" x="447" y="190">−</text>
  </g>
</svg>
