<svg xmlns="http://www.w3.org/2000/svg" width="430" height="240" viewBox="0 0 430 240" role="img" aria-labelledby="title desc">
  <title id="title">串联 RLC 电路</title>
  <desc id="desc">输入电压 u 括号 t 上正下负，驱动一个串联回路。电流 i 括号 t 沿上支路向右。电感为 2 亨利，电阻为 1 欧姆，电容为 0.125 法拉。</desc>
  <defs>
    <style>
      .wire { fill: none; stroke: #111; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .component { fill: #fff; stroke: #111; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .terminal { fill: #fff; stroke: #111; stroke-width: 2.2; }
      .label { fill: #111; font-family: "Times New Roman", "Noto Serif CJK SC", serif; font-size: 23px; }
      .small { font-size: 20px; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
  </defs>

  <g id="terminals-and-wires">
    <circle class="terminal" cx="70" cy="55" r="5"/>
    <circle class="terminal" cx="70" cy="190" r="5"/>
    <path class="wire" d="M 75 55 H 190"/>
    <path class="wire" d="M 250 55 H 320 V 95"/>
    <path class="wire" d="M 320 143 V 190 H 215"/>
    <path class="wire" d="M 198 190 H 75"/>
  </g>

  <g id="current-direction">
    <path class="wire" d="M 112 55 H 157" marker-end="url(#arrow)"/>
    <text class="label" x="129" y="31" font-style="italic">i(t)</text>
  </g>

  <g id="inductor">
    <path class="wire" d="M 190 55 C 190 42, 210 42, 210 55 C 210 42, 230 42, 230 55 C 230 42, 250 42, 250 55"/>
    <text class="label" x="220" y="28" text-anchor="middle">2 H</text>
  </g>

  <g id="resistor">
    <rect class="component" x="311" y="95" width="18" height="48"/>
    <text class="label" x="347" y="126">1 Ω</text>
  </g>

  <g id="capacitor">
    <line class="wire" x1="198" y1="175" x2="198" y2="205"/>
    <line class="wire" x1="215" y1="175" x2="215" y2="205"/>
    <text class="label small" x="170" y="163">0.125 F</text>
  </g>

  <g id="input-voltage" class="label">
    <text x="25" y="64">+</text>
    <text x="8" y="129" font-style="italic">u(t)</text>
    <text x="28" y="198">−</text>
  </g>
</svg>
