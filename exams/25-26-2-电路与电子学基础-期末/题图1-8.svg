<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320" role="img" aria-labelledby="title desc">
  <title id="title">晶体管 RC 电路</title>
  <desc id="desc">输入电压 u 经串联电容接到晶体管基极节点。该节点通过电阻 R 接上方电源轨，并通过电容接地。晶体管上方带指向基极的箭头支路接输出节点，输出节点经电阻 R 下标 C 接上方电源轨；晶体管下方支路接地。右侧引出上、中、下三个端口。</desc>
  <defs>
    <style>
      .wire { fill: none; stroke: #111; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .component { fill: #fff; stroke: #111; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .node { fill: #111; }
      .terminal { fill: #fff; stroke: #111; stroke-width: 2.2; }
      .label { fill: #111; font-family: "Times New Roman", "Noto Serif CJK SC", serif; font-size: 25px; }
      .polarity { font-size: 23px; }
    </style>
  </defs>

  <g id="rails-and-terminals">
    <path class="wire" d="M 205 40 H 440"/>
    <path class="wire" d="M 50 279 H 426"/>
    <path class="wire" d="M 320 143 H 426"/>
    <circle class="terminal" cx="442" cy="40" r="4.5"/>
    <circle class="terminal" cx="428" cy="143" r="4.5"/>
    <circle class="terminal" cx="428" cy="279" r="4.5"/>
    <circle class="terminal" cx="50" cy="279" r="4.5"/>
  </g>

  <g id="input-coupling-capacitor">
    <circle class="node" cx="58" cy="182" r="4.5"/>
    <path class="wire" d="M 58 182 H 136 M 150 182 H 205"/>
    <line class="wire" x1="136" y1="168" x2="136" y2="196"/>
    <line class="wire" x1="150" y1="168" x2="150" y2="196"/>
  </g>

  <g id="bias-resistor">
    <path class="wire" d="M 205 40 V 88 M 205 136 V 182"/>
    <rect class="component" x="196" y="88" width="18" height="48"/>
    <text class="label" x="165" y="123" font-style="italic">R</text>
  </g>

  <g id="shunt-capacitor">
    <path class="wire" d="M 205 182 V 217 M 205 231 V 279"/>
    <line class="wire" x1="190" y1="217" x2="220" y2="217"/>
    <line class="wire" x1="190" y1="231" x2="220" y2="231"/>
  </g>

  <g id="collector-resistor">
    <path class="wire" d="M 320 40 V 83 M 320 131 V 143"/>
    <rect class="component" x="311" y="83" width="18" height="48"/>
    <text class="label" x="344" y="113" font-style="italic">R<tspan baseline-shift="sub" font-size="17">C</tspan></text>
  </g>

  <g id="transistor">
    <path class="wire" d="M 205 182 H 278"/>
    <line class="wire" x1="278" y1="165" x2="278" y2="211"/>
    <path class="wire" d="M 280 175 L 320 143"/>
    <polygon points="286,170 293,158 299,166" fill="#111"/>
    <path class="wire" d="M 280 199 L 306 212 V 279"/>
  </g>

  <g id="junctions">
    <circle class="node" cx="205" cy="182" r="4"/>
    <circle class="node" cx="320" cy="143" r="4"/>
    <circle class="node" cx="306" cy="279" r="4"/>
  </g>

  <g id="ground">
    <path class="wire" d="M 306 279 V 299 M 292 299 H 320"/>
  </g>

  <g id="input-labels" class="label">
    <text class="polarity" x="25" y="177">+</text>
    <text x="13" y="238" font-style="italic">u</text>
    <text class="polarity" x="27" y="278">−</text>
  </g>
</svg>
